- type: entity
  id: BoardingTeleportWarmupEffect
  categories: [ HideSpawnMenu ]
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    noRot: true
    drawdepth: Effects
    sprite: Forge/Effects/boarding_teleport_warmup.rsi
    layers:
    - state: warmup
      shader: unshaded
  - type: PointLight
    color: "#65b8e2"
    radius: 8
    energy: 3
    netsync: false
  - type: TimedDespawn
    lifetime: 1.2

