- type: entity
  parent: BaseComputerCircuitboard
  id: BoardingTeleportConsoleCircuitboard
  name: bluespace boarding console board
  description: A computer circuit board for a bluespace boarding console.
  components:
  - type: Sprite
    state: cpu_science
  - type: ComputerBoard
    prototype: ComputerBoardingTeleport
  - type: Tag
    tags:
    - DroneUsable
    - HighRiskItem

- type: entity
  parent: BaseMachineCircuitboard
  id: BoardingBluespaceScramblerMachineCircuitboard
  name: bluespace scrambler board
  description: A machine printed circuit board for a bluespace scrambler.
  components:
  - type: Sprite
    state: science
  - type: MachineBoard
    prototype: BoardingBluespaceScrambler
    requirements:
      Manipulator: 2
      Capacitor: 4
    stackRequirements:
      Steel: 5
      Glass: 5
      Plasma: 3

